name: Omoide
on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: omoide
          POSTGRES_PASSWORD: omoide
          POSTGRES_DB: omoide_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omoide -d omoide_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Sync URL — workers and integration fixtures connect via psycopg2.
      OMOIDE_TEST_DB_URL: postgresql+psycopg2://omoide:omoide@localhost:5432/omoide_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install uv
          uv sync --all-extras

      - name: Enable required Postgres extensions
        env:
          PGPASSWORD: omoide
        run: |
          psql -h localhost -U omoide -d omoide_test \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" \
            -c "CREATE EXTENSION IF NOT EXISTS btree_gin;"

      - name: Lint with Ruff
        run: uv run ruff check --output-format=github .

      - name: Test with mypy
        run: uv run mypy ./omoide

      - name: Run tests with coverage
        run: uv run coverage run -m pytest ./omoide/tests

      - name: Coverage report
        run: |
          uv run coverage report
          uv run coverage xml -o coverage.xml
          PCT=$(uv run coverage report --format=total)
          echo "### Test coverage: ${PCT}%" >> "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo '```'
            uv run coverage report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
