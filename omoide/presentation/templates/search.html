{% extends "base_search.html" %}

{% block head %}
    {{ super() }}
    <script type="text/javascript"
            src="{{ request.url_for('static', path='scroller.js?' + version) }}">
    </script>
{% endblock %}

{% block body %}

    <h3 id="search_total"></h3>
    <div class="envelope-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const container = document.querySelector('.envelope-container')
            const endpoint = '{{ endpoint }}'
            const totalEndpoint = '{{ total_endpoint }}'
            const scroller = new Scroller(container, endpoint)
            const callback = function () {
                scroller.trigger()
            }

            const searchParams = new URLSearchParams(window.location.search)
            const totalUrl = totalEndpoint + '?' + searchParams.toString()
            try {
                const response = await fetch(totalUrl, {
                    headers: {'Accept': 'application/json'},
                })
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`)
                }
                const data = await response.json()
                const total = Number(data['total']).toLocaleString('RU-ru')
                const duration = data['duration'].toFixed(3)
                document.getElementById('search_total').textContent =
                    `Got ${total} results in ${duration} sec.`
            } catch (err) {
                console.log(`Request to ${totalUrl} failed: ${err}`)
            }

            window.addEventListener('scroll', callback)
            scroller.intervalId = setInterval(callback, SCROLLER_INTERVAL)
            callback()

            activateFloatingHeader()
            updateHeaderPadding()
        });
    </script>

{% endblock %}
